<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Member</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7fe;
            color: #2b3674;
            margin: 0;
        }

        /* --- Responsive Wrapper Layout --- */
        .dashboard-wrapper {
            display: flex;
            flex-direction: row;
        }

        /* --- Sidebar (Default: Laptops & Desktops) --- */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #111827; 
            color: white;
            padding: 15px; /* Top/Bottom padding thodi kam ki hai */
            z-index: 1000;
            transition: all 0.3s ease;
            overflow-y: auto; /* YEH LINE add ki hai taaki scroll aa sake */
        }

        /* Sidebar ka scrollbar hide karne ke liye (Optional par acha dikhta hai) */
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ... baaki apka logo-section wala code waisa hi rahega ... */

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 8px 12px; /* Padding kam kardi */
            margin-bottom: 4px; /* Margin kam kardi */
            color: #9ca3af;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13.5px; /* Font size thoda sa adjust kiya */
            transition: all 0.3s ease;
        }

        /* --- Main Content --- */
        .main-content {
            margin-left: 220px;
            padding: 30px;
            width: 100%;
            transition: all 0.3s ease;
            max-width: calc(100% - 220px);
        }

        /* --- Topbar --- */
        .topbar {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }

        .topbar h4 { font-weight: 700; margin: 0; color: #111827; }

        /* --- Form Card --- */
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            max-width: 800px;
        }

        .form-control, .form-select {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            color: #334155;
            box-shadow: none;
        }

        .form-control:focus, .form-select:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.1);
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* =========================================================
           BREAKPOINTS FOR PAD, TABLET, AND MOBILE PHONES
           ========================================================= */
        @media (max-width: 991px) {
            .sidebar { width: 180px; padding: 15px 10px; }
            .sidebar a { font-size: 13px; padding: 8px 10px; }
            .main-content { margin-left: 180px; padding: 20px; max-width: calc(100% - 180px); }
        }

        @media (max-width: 767px) {
            .dashboard-wrapper { flex-direction: column; }
            
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                padding: 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .logo-section { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
            .logo-section hr { display: none; }
            .logo-section h6 { margin: 0 !important; }

            .sidebar-nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
                width: 100%;
            }

            .sidebar a { margin-bottom: 0; padding: 6px 12px; font-size: 12px; }

            .main-content {
                margin-left: 0;
                padding: 15px;
                max-width: 100%;
            }

            .topbar {
                flex-direction: column;
                align-items: stretch !important;
                gap: 15px;
                text-align: center;
            }
            
            .topbar a { width: 100%; }
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <!-- Sidebar / Top Nav on Mobile -->
    <div class="sidebar">
        <div class="logo-section">
            <img src="/static/logo.jpeg" width="50" alt="Gym Logo" onerror="this.src='https://via.placeholder.com/50?text=Logo'">
            <h6 class="mt-2" style="text-transform: uppercase;">{{ session.gym_name }}</h6>
            <hr style="border-color: #374151; width: 100%;">
        </div>

        <div class="sidebar-nav w-100">
            <a href="/"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a href="/add"><i class="bi bi-person-plus-fill"></i> Add Member</a>
            <a href="/members"><i class="bi bi-people-fill"></i> Members List</a>
            <a href="/left-gym"><i class="bi bi-door-open-fill"></i> Left Gym</a>
            <a href="/recent-joins"><i class="bi bi-person-check-fill"></i> Recent Joins</a>
             
            <a href="/export"><i class="bi bi-file-earmark-excel-fill"></i> Export Data</a>
            <!-- Add this right after the Export Data link -->
            <hr style="border-color: #374151; width: 100%; margin: 15px 0;">
            
             
            <a href="/logout" class="text-danger" style="font-weight: 600; margin-top: 5px;">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        
        <!-- Header area -->
        <div class="topbar d-flex justify-content-between align-items-center">
            <h4 class="m-0"><i class="bi bi-pencil-square me-2 text-warning"></i> Edit Member Profile</h4>
            <a href="/members" class="btn btn-outline-secondary" style="border-radius: 8px; font-weight: 500;">
                <i class="bi bi-arrow-left"></i> Back to Members
            </a>
        </div>

        <!-- Form Card -->
        <div class="form-card mx-auto mx-md-0">
            <form method="POST">
                
                <div class="row">
                    <!-- Name -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" name="name" value="{{ member.name }}" class="form-control border-start-0 ps-0" required>
                        </div>
                    </div>

                    <!-- Mobile -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Mobile Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-telephone"></i></span>
                            <input type="text" name="mobile" value="{{ member.mobile }}" class="form-control border-start-0 ps-0" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <!-- Plan -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Membership Plan</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-calendar2-check"></i></span>
                            <select name="plan" class="form-select border-start-0 ps-0" required>
                                <option value="1" {% if member.plan == 1 %}selected{% endif %}>1 Month</option>
                                <option value="2" {% if member.plan == 2 %}selected{% endif %}>2 Months</option>
                                <option value="3" {% if member.plan == 3 %}selected{% endif %}>3 Months</option>
                                <option value="4" {% if member.plan == 4 %}selected{% endif %}>4 Months</option>
                                <option value="5" {% if member.plan == 5 %}selected{% endif %}>5 Months</option>
                                <option value="6" {% if member.plan == 6 %}selected{% endif %}>6 Months</option>
                                <option value="7" {% if member.plan == 7 %}selected{% endif %}>7 Months</option>
                                <option value="8" {% if member.plan == 8 %}selected{% endif %}>8 Months</option>
                                <option value="9" {% if member.plan == 9 %}selected{% endif %}>9 Months</option>
                                <option value="10" {% if member.plan == 10 %}selected{% endif %}>10 Months</option>
                                <option value="11" {% if member.plan == 11 %}selected{% endif %}>11 Months</option>
                                <option value="12" {% if member.plan == 12 %}selected{% endif %}>12 Months</option>
                                <option value="24" {% if member.plan == 24 %}selected{% endif %}>24 Months</option>
                            </select>
                        </div>
                    </div>

                    <!-- Join Date -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Join Date</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-calendar-date"></i></span>
                            <input type="date" name="join_date" value="{{ member.join_date }}" class="form-control border-start-0 ps-0" required>
                        </div>
                    </div>
                </div>

                <hr class="my-4" style="border-color: #e2e8f0;">

                <div class="d-flex justify-content-end gap-3">
                    <a href="/members" class="btn btn-light px-4 py-2" style="border-radius: 8px; font-weight: 500; border: 1px solid #e2e8f0;">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-warning px-4 py-2 shadow-sm text-dark" style="border-radius: 8px; font-weight: 600;">
                        <i class="bi bi-arrow-clockwise"></i> Update Member
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
