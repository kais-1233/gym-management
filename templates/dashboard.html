<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7fe; 
            color: #2b3674;
            margin: 0;
        }

        /* --- Responsive Wrapper Layout --- */
        .dashboard-wrapper {
            display: flex;
            flex-direction: row;
        }

        /* --- Sidebar (Default: Laptops & Desktops) --- */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #111827; 
            color: white;
            padding: 20px 15px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .logo-section {
            margin-bottom: 25px;
            text-align: center;
        }

        .logo-section img {
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .logo-section h6 {
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffffff;
            font-size: 13px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            color: #9ca3af;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .sidebar a i {
            margin-right: 10px;
            font-size: 1rem;
        }

        .sidebar a:hover, .sidebar a.active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        /* --- Main Content (Default: Laptop) --- */
        .main-content {
            margin-left: 220px;
            padding: 30px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .topbar h4 { font-weight: 700; margin-bottom: 2px; }
        .topbar small { color: #a3aed1; font-weight: 500; }

        /* --- Stat Cards --- */
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e2e8f0;
            height: 100%;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            color: inherit;
        }

        .stat-info h5 { font-size: 13px; color: #a3aed1; font-weight: 600; margin-bottom: 5px; }
        .stat-info h1 { font-size: 26px; font-weight: 700; color: #111827; margin: 0; }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .icon-blue { background: #e0e7ff; color: #4f46e5; }
        .icon-green { background: #dcfce7; color: #16a34a; }
        .icon-orange { background: #ffedd5; color: #ea580c; }
        .icon-red { background: #fee2e2; color: #dc2626; }

        .search-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
/* --- Sidebar (Default: Laptops & Desktops) --- */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #111827; 
            color: white;
            padding: 15px; /* Top/Bottom padding thodi kam ki hai */
            z-index: 1000;
            transition: all 0.3s ease;
            overflow-y: auto; /* YEH LINE add ki hai taaki scroll aa sake */
        }

        /* Sidebar ka scrollbar hide karne ke liye (Optional par acha dikhta hai) */
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ... baaki apka logo-section wala code waisa hi rahega ... */

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 8px 12px; /* Padding kam kardi */
            margin-bottom: 4px; /* Margin kam kardi */
            color: #9ca3af;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13.5px; /* Font size thoda sa adjust kiya */
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <div class="sidebar">
        <div class="logo-section">
            <img src="/static/logo.jpeg" width="50" alt="Gym Logo" onerror="this.src='https://via.placeholder.com/50?text=Logo'">
            <h6 class="mt-2" style="text-transform: uppercase;">{{ session.gym_name }}</h6>
            <hr style="border-color: #374151; width: 100%;">
        </div>

        <div class="sidebar-nav w-100">
            <a href="/" class="active"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a href="/add"><i class="bi bi-person-plus-fill"></i> Add Member</a>
            <a href="/members"><i class="bi bi-people-fill"></i> Members List</a>
            <a href="/left-gym"><i class="bi bi-door-open-fill"></i> Left Gym</a>
            <a href="/recent-joins"><i class="bi bi-person-check-fill"></i> Recent Joins</a>
            <a href="/revenue"><i class="bi bi-cash-stack"></i> Revenue</a>
            <a href="/export"><i class="bi bi-file-earmark-excel-fill"></i> Export Data</a>
            
            <hr style="border-color: #374151; width: 100%; margin: 15px 0;">
            
            <a href="/admin"><i class="bi bi-gear-fill"></i> Admin Panel</a>
            <a href="/logout" class="text-danger" style="font-weight: 600; margin-top: 5px;">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>

    <div class="main-content">
        
        <div class="topbar d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4>Dashboard Overview</h4>
                <small>Welcome back! Here's what's happening at the gym.</small>
            </div>
            <a href="/add" class="btn btn-primary px-4 py-2" style="border-radius: 8px; font-weight: 500;">
                <i class="bi bi-plus-lg"></i> Add Member
            </a> 
        </div>

        <div class="search-container">
            <form action="/members" method="GET" class="m-0">
                <div class="row g-3 align-items-center">
                    <div class="col-md-9 col-sm-10">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="search" class="form-control bg-light border-start-0" placeholder="Search members by name or mobile number..." style="box-shadow: none;">
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-2">
                        <button type="submit" class="btn btn-primary w-100" style="border-radius: 8px; font-weight: 500;">
                            Search
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="row g-3 g-md-4">
            
            <div class="col-6 col-md-3">
                <a href="/members" class="text-decoration-none d-block h-100">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h5>Total</h5>
                            <h1>{{ total }}</h1>
                        </div>
                        <div class="icon-box icon-blue d-none d-sm-flex">
                            <i class="bi bi-people-fill"></i>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-3">
                <a href="/members?status=active" class="text-decoration-none d-block h-100">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h5>Active</h5>
                            <h1>{{ active }}</h1>
                        </div>
                        <div class="icon-box icon-green d-none d-sm-flex">
                            <i class="bi bi-activity"></i>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-3">
                <a href="/members?status=expiring" class="text-decoration-none d-block h-100">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h5>Expiring</h5>
                            <h1>{{ expiring }}</h1>
                        </div>
                        <div class="icon-box icon-orange d-none d-sm-flex">
                            <i class="bi bi-clock-history"></i>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-3">
                <a href="/members?status=expired" class="text-decoration-none d-block h-100">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h5>Expired</h5>
                            <h1>{{ expired }}</h1>
                        </div>
                        <div class="icon-box icon-red d-none d-sm-flex">
                            <i class="bi bi-exclamation-octagon-fill"></i>
                        </div>
                    </div>
                </a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
