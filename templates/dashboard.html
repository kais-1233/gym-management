<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
    :root {
        --bg-main: #f8fafc;
        --sidebar-bg: rgba(17, 24, 39, 0.95); /* Ultra dark with slight glass effect */
        --accent-color: #6366f1; /* Indigo trend color */
        --text-main: #1e293b;
        --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 5px 15px -7px rgba(0, 0, 0, 0.05);
        --glass-blur: blur(12px);
        
        /* Icon Colors */
        --blue-primary: #4f46e5;
        --green-success: #16a34a;
        --orange-warning: #ea580c;
        --red-danger: #dc2626;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        color: var(--text-main);
        margin: 0;
        min-height: 100vh;
    }

    /* --- Responsive Wrapper Layout --- */
    .dashboard-wrapper {
        display: flex;
        flex-direction: row;
        width: 100%;
    }

    /* --- Ultra Creative Floating Sidebar (Desktop) --- */
    .sidebar {
        width: 240px;
        height: calc(100vh - 40px);
        position: fixed;
        left: 20px;
        top: 20px;
        background: var(--sidebar-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        color: white;
        padding: 25px 20px;
        z-index: 1000;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto;
    }

    .sidebar::-webkit-scrollbar { display: none; }

    .logo-section {
        margin-bottom: 25px;
        text-align: center;
    }

    .logo-section img {
        border-radius: 16px;
        padding: 5px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo-section h6 {
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 1.5px;
        background: linear-gradient(to right, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Sidebar Links UI */
    .sidebar a {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        margin-bottom: 8px;
        color: #94a3b8;
        text-decoration: none;
        border-radius: 14px;
        font-weight: 500;
        font-size: 14px;
        transition: all 0.3s ease;
    }

    .sidebar a i { 
        margin-right: 12px; 
        font-size: 1.1rem;
        transition: transform 0.3s ease;
    }

    .sidebar a:hover {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.05);
        transform: translateX(4px);
    }

    .sidebar a.active {
        background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
        color: #ffffff;
        font-weight: 600;
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }

    .sidebar a:hover i {
        transform: scale(1.1);
    }

    /* Main Content (Desktop Layout) */
    .main-content {
        margin-left: 280px;
        padding: 40px 30px;
        width: calc(100% - 280px);
        transition: all 0.4s ease;
    }

    /* --- Premium UI Cards & Glassmorphism Surfaces --- */
    .topbar, .search-container, .table-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: var(--card-shadow);
        padding: 24px;
    }

    .topbar h4 { font-weight: 700; color: #1e293b; margin: 0; }
    .topbar small { color: #64748b; font-weight: 500; }

    /* Stat Cards Styling */
    .stat-card {
        background: white;
        border-radius: 24px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: var(--card-shadow);
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .stat-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
        pointer-events: none;
    }

    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.08);
    }

    .stat-info h5 { font-size: 13px; color: #64748b; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-info h1 { font-size: 32px; font-weight: 700; color: #1e293b; margin: 0; }

    .icon-box {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
    }

    .icon-blue { background: #e0e7ff; color: var(--blue-primary); }
    .icon-green { background: #dcfce7; color: var(--green-success); }
    .icon-orange { background: #ffedd5; color: var(--orange-warning); }
    .icon-red { background: #fee2e2; color: var(--red-danger); }

    /* ==========================================
       PAD & TABLET RESPONSIVE (iPads)
       ========================================== */
    @media (max-width: 1024px) {
        .sidebar {
            width: 80px;
            left: 10px;
            top: 10px;
            height: calc(100vh - 20px);
            padding: 20px 10px;
        }
        .logo-section h6, .sidebar a span, .sidebar hr {
            display: none !important;
        }
        .sidebar a {
            justify-content: center;
            padding: 15px 0;
            border-radius: 12px;
        }
        .sidebar a i { margin: 0; font-size: 1.4rem; }
        .main-content {
            margin-left: 110px;
            width: calc(100% - 110px);
            padding: 25px 20px;
        }
    }

    /* ==========================================
       MOBILE PHONE RESPONSIVE (100% Strict Block Fix)
       ========================================== */
    @media (max-width: 767px) {
        .dashboard-wrapper {
            display: block !important; /* Flexbox block me convert kiya */
        }
        .sidebar {
            position: static !important; /* Fixed aur relative hata kar normal kiya */
            width: calc(100% - 30px) !important;
            height: auto !important;
            margin: 15px auto !important;
            border-radius: 20px;
            padding: 15px;
        }
        .logo-section {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
            align-items: center;
            gap: 10px;
        }
        .logo-section h6 { margin: 0 !important; }
        .logo-section hr { display: none !important; }
        
        .sidebar-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .sidebar a {
            margin-bottom: 0;
            padding: 8px 14px;
            font-size: 13px;
        }
        .main-content {
            margin-left: 0 !important;
            width: 100% !important;
            padding: 10px 15px 30px 15px !important; /* Proper breathing top padding */
        }
        .topbar {
            flex-direction: column;
            align-items: stretch !important;
            text-align: center;
            gap: 15px;
        }
        .stat-card {
            padding: 20px 15px;
        }
        .stat-info h1 {
            font-size: 26px;
        }
    }       
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <div class="sidebar">
        <div class="logo-section">
            <img src="/static/logo.jpeg" width="50" alt="Gym Logo" onerror="this.src='https://via.placeholder.com/50?text=Logo'">
            <h6 class="mt-2" style="text-transform: uppercase;">{{ session.gym_name }}</h6>
            <hr style="border-color: rgba(255,255,255,0.1); width: 100%;">
        </div>

        <div class="sidebar-nav w-100">
            <a href="/" class="active"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
            <a href="/add"><i class="bi bi-person-plus-fill"></i> <span>Add Member</span></a>
            <a href="/members"><i class="bi bi-people-fill"></i> <span>Members List</span></a>
            <a href="/left-gym"><i class="bi bi-door-open-fill"></i> <span>Left Gym</span></a>
            <a href="/recent-joins"><i class="bi bi-person-check-fill"></i> <span>Recent Joins</span></a>
            
            <a href="/export"><i class="bi bi-file-earmark-excel-fill"></i> <span>Export Data</span></a>
            
            <hr style="border-color: rgba(255,255,255,0.1); width: 100%; margin: 15px 0;">
             
            <a href="/logout" class="text-danger" style="font-weight: 600; margin-top: 5px;">
                <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
            </a>
        </div>
    </div>

    <div class="main-content">
        
        <div class="topbar d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4>Dashboard Overview</h4>
                <small>Welcome back! Here's what's happening at the gym.</small>
            </div>
            <a href="/add" class="btn btn-primary px-4 py-2" style="border-radius: 12px; font-weight: 500; background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); border: none; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);">
                <i class="bi bi-plus-lg"></i> Add Member
            </a> 
        </div>

        <div class="search-container mb-4">
            <form action="/members" method="GET" class="m-0">
                <div class="row g-3 align-items-center">
                    <div class="col-md-9 col-sm-10">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px;"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="search" class="form-control bg-light border-start-0" placeholder="Search members by name or mobile number..." style="box-shadow: none; border-radius: 0 12px 12px 0; padding: 12px;">
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-2">
                        <button type="submit" class="btn btn-primary w-100" style="border-radius: 12px; font-weight: 500; padding: 12px; background: #4f46e5; border: none;">
                            Search
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="row g-3 g-md-4">
            
            <div class="col-6 col-md-3">
                <a href="/members" class="text-decoration-none d-block h-100">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h5>Total</h5>
                            <h1>{{ total }}</h1>
                        </div>
                        <div class="icon-box icon-blue">
                            <i class="bi bi-people-fill"></i>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-3">
                <a href="/members?status=active" class="text-decoration-none d-block h-100">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h5>Active</h5>
                            <h1>{{ active }}</h1>
                        </div>
                        <div class="icon-box icon-green">
                            <i class="bi bi-activity"></i>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-3">
                <a href="/members?status=expiring" class="text-decoration-none d-block h-100">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h5>Expiring</h5>
                            <h1>{{ expiring }}</h1>
                        </div>
                        <div class="icon-box icon-orange">
                            <i class="bi bi-clock-history"></i>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-3">
                <a href="/members?status=expired" class="text-decoration-none d-block h-100">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h5>Expired</h5>
                            <h1>{{ expired }}</h1>
                        </div>
                        <div class="icon-box icon-red">
                            <i class="bi bi-exclamation-octagon-fill"></i>
                        </div>
                    </div>
                </a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
