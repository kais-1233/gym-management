<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Manager - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #f4f7fe; }</style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 500px; border-radius: 16px; border: none;">
        <div class="text-center mb-3">
            <h4>Create Account</h4>
            <small class="text-muted">Register your gym details below</small>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert" style="border-radius: 8px; font-size: 14px;">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/register" id="registerForm">
            <div class="mb-3">
                <label class="form-label">Client Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Rahul Sharma" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Gym Name</label>
                <input type="text" name="gym_name" class="form-control" placeholder="e.g. The Sweat House" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" name="mobile" class="form-control" placeholder="10-digit number" pattern="[0-9]{10}" maxlength="10" title="Please enter exactly 10 digits" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="gym@email.com" pattern="^[a-zA-Z0-9._%+\-]+@[a-zA-Z0-9.\-]+\.com$" title="Email must contain '@' and end with '.com'" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="regPassword" class="form-control" pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{6,12}$" maxlength="12" title="Password must be 6 to 12 characters long and include at least one letter, one number, and one special character." required>
                        <button class="btn btn-outline-secondary toggle-password" type="button" data-target="regPassword" style="border-color: #dee2e6;">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" name="confirm_password" id="regConfirmPassword" class="form-control" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button" data-target="regConfirmPassword" style="border-color: #dee2e6;">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                    <small id="passwordError" class="text-danger" style="display: none; font-weight: 500;">Passwords do not match</small>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100" style="border-radius: 8px;">Register Gym</button>
        </form>
        
        <div class="text-center mt-3">
            <small>Already have an account? <a href="/login" class="text-decoration-none">Login here</a></small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password Match Validation Logic
        const form = document.getElementById('registerForm');
        const pwd = document.getElementById('regPassword');
        const confirmPwd = document.getElementById('regConfirmPassword');
        const errorMsg = document.getElementById('passwordError');

        form.addEventListener('submit', function(e) {
            if (pwd.value !== confirmPwd.value) {
                e.preventDefault(); // Stop form from submitting
                errorMsg.style.display = 'block';
                confirmPwd.style.borderColor = '#dc3545';
            } else {
                errorMsg.style.display = 'none';
                confirmPwd.style.borderColor = '#dee2e6';
            }
        });

        // Show/Hide Password Toggle Logic
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const icon = this.querySelector('i');

                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bi-eye-slash');
                    icon.classList.add('bi-eye');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bi-eye');
                    icon.classList.add('bi-eye-slash');
                }
            });
        });
    </script>
</body>
</html>
