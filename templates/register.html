<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Manager - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #f4f7fe; }</style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 450px; border-radius: 16px; border: none;">
        <div class="text-center mb-3">
            <h4>Create Account</h4>
            <small class="text-muted">Register your gym details below</small>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert" style="border-radius: 8px; font-size: 14px;">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label">Client Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Rahul Sharma" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Gym Name</label>
                <input type="text" name="gym_name" class="form-control" placeholder="e.g. The Sweat House" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" name="mobile" class="form-control" placeholder="10-digit number" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="gym@email.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100" style="border-radius: 8px;">Register Gym</button>
        </form>
        
        <div class="text-center mt-3">
            <small>Already have an account? <a href="/login" class="text-decoration-none">Login here</a></small>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
