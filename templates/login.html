<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Manager - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #f4f7fe; }</style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px; border-radius: 16px; border: none;">
        <div class="text-center mb-3">
            <h4>Welcome Back</h4>
            <small class="text-muted">Login to manage your gym</small>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert" style="border-radius: 8px; font-size: 14px;">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label">Email OR Mobile Number</label>
                <input type="text" name="login_id" class="form-control" placeholder="Enter email or mobile" required>
            </div>
            
            <div class="mb-2">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="loginPassword" class="form-control" required>
                    <button class="btn btn-outline-secondary toggle-password" type="button" data-target="loginPassword" style="border-color: #dee2e6;">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>
            
            <div class="text-end mb-4">
                <a href="/forgot-password" class="text-decoration-none" style="font-size: 13px;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100" style="border-radius: 8px;">Login</button>
        </form>
        
        <div class="text-center mt-3">
            <small>Don't have an account? <a href="/register" class="text-decoration-none">Register here</a></small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Show/Hide Password Toggle Logic
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const icon = this.querySelector('i');

                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bi-eye-slash');
                    icon.classList.add('bi-eye');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bi-eye');
                    icon.classList.add('bi-eye-slash');
                }
            });
        });
    </script>
</body>
</html>
